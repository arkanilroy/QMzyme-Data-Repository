[Environment Selection]
# The atoms from which we calculate the electric field
sele_environment      = protein

[Probe Selection]
# Provide the target selection for the MODE of you choice
# e.g. if bond is used, then selbond1 and selbond2 must be defined.
mode                = BOND    
selbond1            = resid 263 and name C1
selbond2            = resid 263 and name O1

[Solvent]
include_solvent     = True    # or False
solvent_cutoff      = 8      # in Angstrom
solvent_selection   = resname WAT

[Time]
dt                  = 10     # Frequency of frames written in your trajectory (in picosecond)

